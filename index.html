<!DOCTYPE html>

<title>SPACE INVADERS II</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;overflow:hidden;user-select:none;touch-action:none}
#header{display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;width:480px;max-width:95vw;padding:4px 2px}
.hud{color:#0ff;font-size:11px;text-shadow:0 0 8px #0ff;font-weight:bold}
#lives{color:#f0f;text-shadow:0 0 8px #f0f}
#lvl{color:#ff0;text-shadow:0 0 8px #ff0}
#pwr{color:#7fffd4;text-shadow:0 0 8px #7fffd4}
canvas{display:block;border:2px solid #0ff;box-shadow:0 0 30px #0ff;background:#000;max-width:95vw}
#mobile-controls{display:flex;gap:8px;margin-top:8px;align-items:center;justify-content:center}
#dpad{display:grid;grid-template-columns:60px 60px 60px;grid-template-rows:60px 60px;gap:4px}
.mbtn{background:rgba(0,255,255,0.1);border:2px solid #0ff;color:#0ff;font-size:16px;width:60px;height:60px;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.mbtn:active{background:rgba(0,255,255,0.4)}
#fire-btn{background:rgba(255,0,100,0.2);border:2px solid #f06;color:#f06;font-size:24px;width:80px;height:80px;border-radius:50%;touch-action:manipulation;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-left:16px}
#fire-btn:active{background:rgba(255,0,100,0.5)}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.93);z-index:999;gap:10px;padding:12px;overflow-y:auto}
#overlay h1{font-size:22px;text-align:center;line-height:1.5}
.btn{background:transparent;border:2px solid #0ff;color:#0ff;font-family:monospace;font-size:12px;padding:10px 20px;cursor:pointer;text-shadow:0 0 8px #0ff;box-shadow:0 0 10px #0ff;margin:2px}
.btn:active{background:#0ff;color:#000}
.lb{border:1px solid #0ff;padding:6px 10px;min-width:200px;background:rgba(0,255,255,0.05);margin:2px 0}
.lb h3{color:#0ff;text-align:center;font-size:10px;margin-bottom:4px}
.lb ol{color:#fff;font-size:9px;line-height:1.7;padding-left:14px}
.lb li{display:flex;justify-content:space-between;ggap:8px}
.lb span{color:#ff0}
.lf{font-size:30px!important;color:#ff0!important;text-shadow:0 0 20px #ff0!important;text-align:center}
.bf{font-size:26px!important;color:#f00!important;text-shadow:0 0 20px #f00!important;text-align:center}
.sf{font-size:24px!important;color:#0ff!important;text-shadow:0 0 20px #0ff!important;text-align:center}
#pname{background:#000;border:1px solid #0ff;color:#0ff;font-family:monospace;font-size:12px;padding:8px 12px;text-align:center;width:220px;margin:4px 0;outline:none}
</style>
</head>
