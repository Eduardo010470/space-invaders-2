// Levels: 1-3 classic, 4 boss, 5-7 free, 8 boss, 9-11 side, 12 boss, 13-15 free, 16 boss, 17-19 side...
function getMode(lvl){
  if(lvl%4===0) return 'boss';
  if(lvl<=3) return 'classic';
  // After level 3: free and side alternate every 3 levels
  var adjusted=lvl-4; // 0-based after first boss
  var cycle=Math.floor(adjusted/4); // which 4-level cycle
  return cycle%2===0?'free':'side';
}

function loadLB(){
  try{return JSON.parse(localStorage.getItem(LB_KEY))||[];}
  catch(e){return[];}
}
function saveLB(){localStorage.setItem(LB_KEY,JSON.stringify(leaderboard));}

async function recLB(pts){
  const date=new Date().toLocaleDateString('pt-BR');
  leaderboard.push({score:pts,date});
  leaderboard.sort(function(a,b){return b.score-a.score;});
  leaderboard=leaderboard.slice(0,10);
  saveLB();
  if(pts>0){
    try{
      await fetch(SB_URL+'/rest/v1/si2_scores',{
        method:'POST',
        headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'},
        body:JSON.stringify({name:playerName||'Player',score:pts})
      });
    }catch(e){}
  }
}

async function fetchOnlineLB(){
  try{
    const r=await fetch(SB_URL+'/rest/v1/si2_scores?select=name,score&order=score.desc&limit=10',{
      mode:'cors',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Accept':'application/json'}
    });
    if(r.ok){
      onlineLB=await r.json();
      // Update leaderboard display if overlay is visible
      var lbEl=document.querySelector('.lb');
      if(lbEl){
        var lbs=document.querySelectorAll('.lb');
        var online='';
        if(onlineLB.length){onlineLB.forEach(function(r,i){online+='<li><span>#'+(i+1)+' '+r.name+'</span><strong>'+r.score+'</strong></li>';});}
        else{online='<li><span>Seja o primeiro!</span></li>';}
        if(lbs[0])lbs[0].querySelector('ol').innerHTML=online;
      }
    }
  }catch(e){onlineLB=[];}
}

}

// Audio
function initAudio(){
  if(ac)return;
  ac=new(window.AudioContext||window.webkitAudioContext)();
  master=ac.createGain();master.gain.value=0.3;master.connect(ac.destination);
}
function tone(type,freq,dur,vol,slide){
  if(!ac)return;
  var o=ac.createOscillator(),g=ac.createGain();
  o.type=type;o.frequency.value=freq;
  if(slide)o.frequency.linearRampToValueAtTime(slide,ac.currentTime+dur);
  g.gain.setValueAtTime(vol||0.1,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
  o.connect(g);g.connect(master);o.start();o.stop(ac.currentTime+dur);
}
function noise(dur,vol){
  if(!ac)return;
  var buf=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  var src=ac.createBufferSource(),g=ac.createGain();
  g.gain.setValueAtTime(vol||0.1,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
  src.buffer=buf;src.connect(g);g.connect(master);src.start();
}

function mkComet(){
  return{x:-60,y:Math.random()*H*.65,vx:5+Math.random()*3,vy:.8+Math.random()*1.5,delay:Math.floor(Math.random()*200)};
}

function initBG(mode){
  stars=[
    Array.from({length:60},function(){return{x:Math.random()*W,y:Math.random()*H,s:Math.random()<.5?1:2,b:Math.random(),sp:.2+Math.random()*.5};}),
    Array.from({length:30},function(){return{x:Math.random()*W,y:Math.random()*H,s:1,b:Math.random(),sp:.5+Math.random()*.8};}),
    Array.from({length:15},function(){return{x:Math.random()*W,y:Math.random()*H,s:2,b:Math.random(),sp:1+Math.random()*1.5};})
  ];
  planets=Array.from({length:3},function(){
    var r=15+Math.random()*25;
    return{x:60+Math.random()*(W-120),y:60+Math.random()*(H-120),r:r,
      c0:['#4488ff','#ff8844','#44ff88','#ff44ff','#ffcc44'][Math.floor(Math.random()*5)],c1:'#000',
      hasMoon:r>20&&Math.random()>.5,moonA:Math.random()*Math.PI*2,
      moonR:r*.28,moonD:r*1.7,moonSp:.007+Math.random()*.01,
      hasRing:r>40&&Math.random()>.5};
  });
  comets=Array.from({length:3},mkComet);
  nebulas=Array.from({length:4},function(){
    return{x:Math.random()*W,y:Math.random()*H,r:40+Math.random()*60,
      col:mode==='side'?'rgba(255,100,0,0.05)':mode==='free'?'rgba(0,255,100,0.05)':'rgba(100,0,255,0.05)'};
  });
}

function drawBG(mode){
  nebulas.forEach(function(n){
    ctx.globalAlpha=.5;
    var g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    g.addColorStop(0,n.col);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  });
  stars.forEach(function(layer){
    layer.forEach(function(st){
      if(mode==='side'){st.x-=st.sp;if(st.x<-2)st.x=W+2;}
      else{st.y+=st.sp;if(st.y>H)st.y=-2;}
      ctx.globalAlpha=.3+st.b*.6;ctx.fillStyle='#fff';ctx.fillRect(st.x,st.y,st.s,st.s);
    });
  });
  ctx.globalAlpha=1;
  planets.forEach(function(p){
    p.moonA+=p.moonSp;
    var g=ctx.createRadialGradient(p.x-p.r*.3,p.y-p.r*.3,p.r*.1,p.x,p.y,p.r);
    g.addColorStop(0,p.c0);g.addColorStop(1,p.c1);
    ctx.shadowBlur=18;ctx.shadowColor=p.c0;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    if(p.hasRing){ctx.strokeStyle=p.c0+'66';ctx.lineWidth=3;ctx.shadowBlur=4;ctx.beginPath();ctx.ellipse(p.x,p.y,p.r*1.6,p.r*.22,.15,0,Math.PI*2);ctx.stroke();}
    if(p.hasMoon){
      var mx=p.x+Math.cos(p.moonA)*p.moonD,my=p.y+Math.sin(p.moonA)*p.moonD*.4;
      ctx.shadowBlur=6;ctx.shadowColor='#aaa';ctx.beginPath();ctx.arc(mx,my,p.moonR,0,Math.PI*2);ctx.fillStyle='#999';ctx.fill();
    }
    ctx.shadowBlur=0;
  });
  comets.forEach(function(c,ci){
    if(c.delay>0){c.delay--;return;}
    c.x+=c.vx;c.y+=c.vy;
    if(c.x>W+100){comets[ci]=mkComet();return;}
    for(var i=0;i<12;i++){
      var t=i/12;ctx.globalAlpha=(1-t)*.6;
      ctx.fillStyle='hsl('+(200+t*40)+',100%,'+(80-t*40)+'%)';
      ctx.beginPath();ctx.arc(c.x-c.vx*i*1.5,c.y-c.vy*i*1.5,2.5*(1-t),0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;ctx.fillStyle='#fff';ctx.shadowBlur=10;ctx.shadowColor='#0ff';
    ctx.beginPath();ctx.arc(c.x,c.y,3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  });
  ctx.globalAlpha=1;
}

function spawnPU(inv){
  if(Math.random()>=PU_PROB)return;
  var type=Math.random()<.5?'double':'shield';
  var pdx=player.isSide?-2:((player.x+18)-(inv.x+10))/120;
  powerups.push({x:inv.x+10,y:inv.y+8,type:type,vy:player.isSide?0:1.5,vx:pdx});
}
function activPU(type){
  if(type==='double')player.doubleTimer=Math.max(player.doubleTimer,PU_DUR);
  else player.shieldTimer=Math.max(player.shieldTimer,PU_DUR);
  exps.push({x:player.x+18,y:player.y+10,life:18,c:type==='double'?'#0ff':'#7fffd4'});
}

function makeBricks(){
  for(var s=0;s<4;s++){
    var sx=50+s*105,sh=[];
    for(var bx=0;bx<14;bx++)for(var by=0;by<8;by++){
      if(by===0&&(bx<2||bx>11))continue;
      if(by>=5&&bx>=4&&bx<=9)continue;
      sh.push({x:sx+bx*6,y:380+by*6,alive:true});
    }
    shields.push(sh);
  }
}

function makeForceField(){
  var ff=[];
  for(var i=0;i<20;i++)ff.push({x:58,y:20+i*22,w:8,h:18,alive:true});
  shields.push(ff);
}

function initBoss(){
  boss={x:W/2-40,y:40,w:80,h:50,hp:6+Math.floor(level/2),maxHp:6+Math.floor(level/2),vx:1.5,ft:0,alive:true};
  bossMode=true;shields=[];invaders=[];
  for(var s=0;s<4;s++){
    var sx=50+s*105,sh=[];
    for(var bx=0;bx<14;bx++)for(var by=0;by<8;by++){
      if(by===0&&(bx<2||bx>11))continue;
      if(by>=5&&bx>=4&&bx<=9)continue;
      sh.push({x:sx+bx*6,y:380+by*6,alive:true});
    }
    shields.push(sh);

}

function makeInvaders(mode){
  invaders=[];
  if(mode==='classic'||mode==='free'){
    var rows=Math.min(3+Math.floor(level/4),6);
    var cols=Math.min(10+Math.floor(level/4),14);
    var gap=Math.floor((W-20)/cols);
    for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
      invaders.push({x:10+c*gap,y:50+r*30,w:26,h:20,t:r<1?3:r<3?2:1,f:0,alive:true});
    }
  }else if(mode==='side'){
    var rows=Math.min(6+Math.floor(level/4),8);
    var cols=3;
    var totalH=rows*30;
    var startY=40+Math.floor((H-40-totalH)/2);
    for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
      invaders.push({x:W-40-c*34,y:startY+r*30,w:26,h:20,t:r<1?3:r<3?2:1,f:0,alive:true});
    }
  }
}

function initLevel(){
  var mode=getMode(level);
  bossMode=false;boss=null;
  bullets=[];ebullets=[];shields=[];powerups=[];exps=[];
  ufo=null;utimer=0;idir=1;itimer=0;fc=0;
  victoryTimer=0;marchStep=0;marchClock=0;fcool=0;
  idelay=Math.max(12,42-level*2);
  if(mode==='classic'){
    // Nave fixa, só esquerda/direita
    player={x:W/2-18,y:H-46,isSide:false,fixedY:true,doubleTimer:0,shieldTimer:0};
  }else if(mode==='side'){
    // Nave fixa atrás da barreira, não se move
    player={x:20,y:H/2-18,isSide:true,fixed:false,fixedX:true,doubleTimer:0,shieldTimer:0};
  }else{
    // free e boss: movimento completo
    player={x:W/2-18,y:H-46,isSide:false,fixedY:false,doubleTimer:0,shieldTimer:0};
  }
  initBG(mode);
  if(mode==='boss'){initBoss();}
  else{
    makeInvaders(mode);
    if(mode==='side')makeForceField();
    else makeBricks();
  }
  updateHUD();
}

function startGame(){
  hideOV();score=0;lives=5;level=1;
  initLevel();running=true;animId=requestAnimationFrame(gameLoop);
}

function gameOver(){
  if(!running)return;
  running=false;cancelAnimationFrame(animId);
  recLB(score);sGO();vib([100,50,100]);
  var gf=0;
  var gp=Array.from({length:30},function(){
    return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,
      life:60+Math.floor(Math.random()*60),c:['#f00','#ff0','#f0f','#ff4400'][Math.floor(Math.random()*4)]};
  });
  function ga(){
    gf++;ctx.clearRect(0,0,W,H);
    ctx.globalAlpha=Math.abs(Math.sin(gf*.15))*.4;ctx.fillStyle='#f00';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
    gp.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.life--;p.vy+=.1;ctx.globalAlpha=p.life/120;ctx.fillStyle=p.c;ctx.shadowBlur=10;ctx.shadowColor=p.c;ctx.fillRect(p.x-3,p.y-3,6,6);});
    ctx.globalAlpha=1;ctx.shadowBlur=0;
    if(gf%20<12){
      ctx.fillStyle='#f00';ctx.shadowBlur=30;ctx.shadowColor='#f00';
      ctx.font='bold '+(48+Math.sin(gf*.2)*4)+'px monospace';
      ctx.textAlign='center';ctx.fillText('GAME',W/2,H/2-20);ctx.fillText('OVER',W/2,H/2+40);
    }
    ctx.shadowBlur=0;ctx.textAlign='left';
    if(gf<120)requestAnimationFrame(ga);else renderEnd(false);
  }
  ga();
}

function drawInvader(inv){
  if(!inv.alive)return;
  var cx=inv.x+13,cy=inv.y+10,t=inv.t,f=inv.f;
  var col,cdark,cglow;
  if(t===3){col='#ff44ff';cdark='#880088';cglow='#f0f';}
  else if(t===2){col='#44ff88';cdark='#008844';cglow='#0f0';}
  else{col='#ffee44';cdark='#886600';cglow='#ff0';}
  ctx.shadowBlur=10;ctx.shadowColor=cglow;
  if(t===3){
    ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(cx,cy-2,10,8,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(cx-4,cy-3,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+4,cy-3,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx-3,cy-4,1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+5,cy-4,1,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=cdark;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(cx,cy,4,.2,Math.PI-.2);ctx.stroke();
    ctx.strokeStyle=col;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(cx-5,cy-9);ctx.lineTo(cx-8,cy-16);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+5,cy-9);ctx.lineTo(cx+8,cy-16);ctx.stroke();
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(cx-8,cy-16,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+8,cy-16,2.5,0,Math.PI*2);ctx.fill();
    var tw=f===0?3:-3;
    ctx.beginPath();ctx.moveTo(cx-8,cy+5);ctx.quadraticCurveTo(cx-10,cy+10+tw,cx-7,cy+16);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-3,cy+7);ctx.quadraticCurveTo(cx-4,cy+12-tw,cx-2,cy+18);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+3,cy+7);ctx.quadraticCurveTo(cx+4,cy+12+tw,cx+2,cy+18);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+8,cy+5);ctx.quadraticCurveTo(cx+10,cy+10-tw,cx+7,cy+16);ctx.stroke();
  }else if(t===2){
    ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(cx,cy,11,7,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=cdark;ctx.beginPath();ctx.arc(cx-4,cy-2,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+4,cy-2,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx-3,cy-3,1.2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+5,cy-3,1.2,0,Math.PI*2);ctx.fill();
    var cw=f===0?2:-2;ctx.strokeStyle=col;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(cx-11,cy);ctx.lineTo(cx-17,cy-3+cw);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-11,cy);ctx.lineTo(cx-17,cy+3+cw);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+11,cy);ctx.lineTo(cx+17,cy-3-cw);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+11,cy);ctx.lineTo(cx+17,cy+3-cw);ctx.stroke();
    var lw=f===0?2:-2;ctx.lineWidth=1.5;
    for(var i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(cx+i*4,cy+6);ctx.lineTo(cx+i*6,cy+14+lw);ctx.stroke();}
  }else{
    ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(cx-7,cy-8,14,10,3);ctx.fill();ctx.beginPath();ctx.roundRect(cx-9,cy+1,18,7,2);ctx.fill();
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(cx-3,cy-4,2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+3,cy-4,2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=cglow;ctx.beginPath();ctx.arc(cx-2,cy-5,.8,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+4,cy-5,.8,0,Math.PI*2);ctx.fill();
    var lo=f===0?0:2;ctx.fillStyle=col;
    ctx.fillRect(cx-9,cy+7,4,3+lo);ctx.fillRect(cx-2,cy+7,4,3-lo);ctx.fillRect(cx+5,cy+7,4,3+lo);
    ctx.fillRect(cx-13,cy+2,4,3);ctx.fillRect(cx+9,cy+2,4,3);
  }
  ctx.shadowBlur=0;
}

  ctx.fillStyle='#ff6644';ctx.fillRect(boss.x+15,boss.y+10,boss.w-30,boss.h-25);
  ctx.fillStyle='#88ffff';ctx.shadowColor='#0ff';
  ctx.beginPath();ctx.arc(boss.x+22,boss.y+18,6,0,Math.PI*2);ctx.fill();

  ctx.strokeStyle='#ff0';ctx.lineWidth=2;ctx.shadowColor='#ff0';
  ctx.beginPath();ctx.moveTo(boss.x+20,boss.y+36);ctx.lineTo(boss.x+28,boss.y+42);ctx.lineTo(boss.x+40,boss.y+38);ctx.lineTo(boss.x+52,boss.y+42);ctx.lineTo(boss.x+60,boss.y+36);ctx.stroke();
  var hpPct=boss.hp/boss.maxHp;
  ctx.fillStyle='#300';ctx.fillRect(boss.x,boss.y-14,boss.w,8);
  ctx.fillStyle=hpPct>.5?'#0f0':hpPct>.25?'#ff0':'#f00';

  ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(boss.x,boss.y-14,boss.w,8);

function gameLoop(){
  if(!running)return;
  if(paused){
    document.getElementById('pauseMsg').style.display='block';
    animId=requestAnimationFrame(gameLoop);return;
  }
  document.getElementById('pauseMsg').style.display='none';
  animId=requestAnimationFrame(gameLoop);
  fc++;
  ctx.clearRect(0,0,W,H);
  var mode=getMode(level);
  drawBG(mode);

  // Player movement
  var spd=3;
  if(player.fixedX){
    // Side mode: move só em Y
    if(keys['ArrowUp']||keys['w'])player.y=Math.max(0,player.y-spd);
    if(keys['ArrowDown']||keys['s'])player.y=Math.min(H-36,player.y+spd);
  }else if(player.fixedY){
    // Classic: só esquerda/direita
    if(keys['ArrowLeft']||keys['a'])player.x=Math.max(0,player.x-spd);
    if(keys['ArrowRight']||keys['d'])player.x=Math.min(W-36,player.x+spd);
  }else{
    // Free/boss: movimento completo
    if(keys['ArrowLeft']||keys['a'])player.x=Math.max(0,player.x-spd);
    if(keys['ArrowRight']||keys['d'])player.x=Math.min(W-36,player.x+spd);
    if(keys['ArrowUp']||keys['w'])player.y=Math.max(0,player.y-spd);
    if(keys['ArrowDown']||keys['s'])player.y=Math.min(H-36,player.y+spd);
  }

  // Timers
  if(player.doubleTimer>0)player.doubleTimer--;
  if(player.shieldTimer>0)player.shieldTimer--;

  // Shooting
  fcool++;
  if((fpress||keys[' '])&&fcool>=MB){
    fcool=0;sShoot();
    if(player.isSide){
      // Lateral: tiro para direita
      if(player.doubleTimer>0){
        bullets.push({x:player.x+36,y:player.y+4,vx:6,vy:0});
        bullets.push({x:player.x+36,y:player.y+32,vx:6,vy:0});
      }else{
        bullets.push({x:player.x+36,y:player.y+18,vx:6,vy:0});
      }
    }else{
      // Classic/free/boss: tiro para cima
      if(player.doubleTimer>0){
        bullets.push({x:player.x+2,y:player.y,vx:0,vy:-6});
        bullets.push({x:player.x+34,y:player.y,vx:0,vy:-6});
      }else{
        bullets.push({x:player.x+18,y:player.y,vx:0,vy:-6});
      }
    }
  }

  // Move bullets
  bullets=bullets.filter(function(b){b.x+=b.vx;b.y+=b.vy;return b.x>-5&&b.x<W+5&&b.y>-5&&b.y<H+5;});
  ebullets=ebullets.filter(function(b){b.x+=b.vx;b.y+=b.vy;return b.x>-5&&b.x<W+5&&b.y>-5&&b.y<H+5;});
  powerups=powerups.filter(function(p){p.x+=p.vx;p.y+=p.vy;return p.x>-20&&p.y<H+20&&p.x<W+20;});

  // UFO - só em modo clássico e livre
  if(mode!=='side'&&mode!=='boss'){
    utimer++;
    if(!ufo&&utimer>400+Math.random()*300){ufo={x:-40,y:20,vx:2.5};utimer=0;}
    if(ufo){ufo.x+=ufo.vx;if(ufo.x>W+50)ufo=null;}
  }

  // Invader movement
  var alive=invaders?invaders.filter(function(i){return i.alive;})  :[];
  if(!bossMode&&alive.length>0){
    marchClock++;if(marchClock>=MBD){marchClock=0;sMarch();}
    itimer++;
    if(itimer>=idelay){
      itimer=0;
      invaders.forEach(function(inv){if(inv.alive)inv.f=inv.f===0?1:0;});
      if(mode==='side'){
        invaders.forEach(function(inv){if(inv.alive)inv.x-=4;});

        if(Math.random()<.3){
          var s=alive[Math.floor(Math.random()*alive.length)];
          ebullets.push({x:s.x,y:s.y+10,vx:-3,vy:0});
        }
      }else{
        invaders.forEach(function(inv){if(inv.alive)inv.x+=idir*10;});
        var maxX=Math.max.apply(null,alive.map(function(i){return i.x+i.w;}));
        var minX=Math.min.apply(null,alive.map(function(i){return i.x;}));
        if(maxX>W-10||minX<10){idir*=-1;invaders.forEach(function(inv){if(inv.alive)inv.y+=14;});idelay=Math.max(12,idelay-1);}
        if(Math.random()<.3){
          var s=alive[Math.floor(Math.random()*alive.length)];
          ebullets.push({x:s.x+13,y:s.y+20,vx:0,vy:3});
        }
      }
    }
  }

  // Boss movement & shooting
  if(bossMode&&boss&&boss.alive){
    boss.x+=boss.vx;
    if(boss.x<10||boss.x+boss.w>W-10)boss.vx*=-1;
    boss.ft++;
    if(boss.ft>=Math.max(50,80-level*3)){
      boss.ft=0;
      var bcx=boss.x+boss.w/2;
      ebullets.push({x:bcx-15,y:boss.y+boss.h,vx:-1,vy:3});
      ebullets.push({x:bcx,y:boss.y+boss.h,vx:0,vy:3});
      ebullets.push({x:bcx+15,y:boss.y+boss.h,vx:1,vy:3});
    }
  }

  // Bullet collisions
  bullets.forEach(function(b,bi){
    // vs invaders
    alive.forEach(function(inv){
      if(!inv.alive)return;
      if(b.x>inv.x&&b.x<inv.x+inv.w&&b.y>inv.y&&b.y<inv.y+inv.h){
        inv.alive=false;bullets.splice(bi,1);
        addScore(inv.t===3?30:inv.t===2?20:10);
        spawnPU(inv);sExp();vib(40);
        exps.push({x:inv.x+13,y:inv.y+9,life:20,c:inv.t===3?'#f0f':inv.t===2?'#0f0':'#ff0'});
      }
    });
    // vs UFO
    if(ufo&&b.x+2>ufo.x&&b.x<ufo.x+40&&b.y+8>ufo.y&&b.y<ufo.y+20){
      addScore(100+Math.floor(Math.random()*200));
      exps.push({x:ufo.x+20,y:ufo.y+7,life:22,c:'#f00'});
      sExp();vib(60);ufo=null;bullets.splice(bi,1);
    }
    // vs boss
    if(boss&&boss.alive&&b.x>boss.x&&b.x<boss.x+boss.w&&b.y>boss.y&&b.y<boss.y+boss.h){
      boss.hp--;bullets.splice(bi,1);sBH();vib(20);
      exps.push({x:b.x,y:b.y,life:10,c:'#ff0'});
      if(Math.random()<.2)powerups.push({x:boss.x+Math.random()*boss.w,y:boss.y+boss.h,type:'shield',vy:1.5,vx:0});
      if(boss.hp<=0){
        boss.alive=false;addScore(500+level*50);sExp();vib([100,50,100,50,200]);
        if(Math.floor(level/4)%2===0){lives=Math.min(lives+1,9);updateHUD();}
        for(var i=0;i<20;i++){
          (function(ii){setTimeout(function(){
            if(boss)exps.push({x:boss.x+Math.random()*boss.w,y:boss.y+Math.random()*boss.h,life:30,c:['#f00','#ff0','#f0f','#fff'][Math.floor(Math.random()*4)]});
          },ii*80);})(i);
        }
        powerups.push({x:boss.x+boss.w/2,y:boss.y+boss.h/2,type:Math.random()<.5?'double':'shield',vy:1.5,vx:0});
      }
    }
    // vs shields
    shields.forEach(function(sh){
      sh.forEach(function(bl){
        if(!bl.alive)return;
        // No modo lateral, tiros da nave nao destroem o campo de forca (x:58)
        if(player.isSide&&bl.x===58)return;
        var bw=bl.w||5,bh=bl.h||5;
        if(b.x+3>bl.x&&b.x<bl.x+bw&&b.y+12>bl.y&&b.y<bl.y+bh){bl.alive=false;bullets.splice(bi,1);}
      });
    });
  });

  // Enemy bullets
  ebullets.forEach(function(b,bi){
    // vs shields
    shields.forEach(function(sh){
      sh.forEach(function(bl){
        if(!bl.alive)return;
        var bw=bl.w||5,bh=bl.h||5;
        if(b.x+3>bl.x&&b.x<bl.x+bw&&b.y+10>bl.y&&b.y<bl.y+bh){
          bl.alive=false;ebullets.splice(bi,1);
          exps.push({x:bl.x+bw/2,y:bl.y+bh/2,life:8,c:'#0f0'});
        }
      });
    });
    // vs player
    var pw=player.isSide?36:36,ph=player.isSide?36:20;
    if(b.x+3>player.x&&b.x<player.x+pw&&b.y+10>player.y&&b.y<player.y+ph){
      if(player.shieldTimer>0){
        ebullets.splice(bi,1);exps.push({x:player.x+18,y:player.y+10,life:15,c:'#7fffd4'});
      }else{
        lives--;ebullets.splice(bi,1);
        exps.push({x:player.x+pw/2,y:player.y+ph/2,life:20,c:'#0ff'});
        sDeath();vib(200);updateHUD();if(lives<=0)gameOver();
      }
    }
  });

  // Powerup pickup
  powerups=powerups.filter(function(p){
    var phit=36,pvhit=player.isSide?36:20;
    if(p.x+8>player.x&&p.x<player.x+phit&&p.y+8>player.y&&p.y<player.y+pvhit){
      activPU(p.type);return false;
    }
    return true;
  });

  // Recalcula alive após movimento para pegar posições atualizadas
  alive=invaders?invaders.filter(function(i){return i.alive;}):[];

  // Alien reaches danger zone - perde vida, não game over
  if(mode==='classic'||mode==='free'){
    var reached=alive.filter(function(i){return i.y+i.h>=H-15;});
    if(reached.length>0){
      reached.forEach(function(i){i.alive=false;});
      lives--;sDeath();vib(200);updateHUD();
      if(lives<=0)gameOver();
    }
  }else if(mode==='side'){
    var reached=alive.filter(function(i){return i.x<=66;});
    if(reached.length>0){
      invaders.forEach(function(i){i.alive=false;});
      lives--;sDeath();vib(200);updateHUD();
      if(lives<=0){gameOver();return;}
      running=false;cancelAnimationFrame(animId);level++;
      renderLV(level,function(){initLevel();running=true;animId=requestAnimationFrame(gameLoop);});
      return;
    }
  }

  // Victory
  if(victoryTimer===0){
    var allDead=bossMode?(boss&&!boss.alive):(alive.length===0);
    if(allDead){victoryTimer=1;recLB(score);sVic();}
  }
  if(victoryTimer>0){
    victoryTimer++;
    if(victoryTimer>=VF){
      running=false;cancelAnimationFrame(animId);level++;
      renderLV(level,function(){initLevel();running=true;animId=requestAnimationFrame(gameLoop);});
      return;
    }
  }

  exps=exps.filter(function(e){return e.life>0;});exps.forEach(function(e){e.life--;});

  // No modo lateral, desenha nave antes da barreira
  if(player.isSide) drawPlayer();

  // Draw shields
  shields.forEach(function(sh){
    sh.forEach(function(b){
      if(!b.alive)return;
      if(b.w){
        var a=.4+Math.sin(fc*.1+b.y*.05)*.3;
        ctx.globalAlpha=a;ctx.shadowBlur=12;ctx.shadowColor='#0ff';
        ctx.fillStyle='#0ff';ctx.fillRect(b.x,b.y,b.w,b.h);
        ctx.globalAlpha=.8;ctx.fillStyle='#fff';ctx.fillRect(b.x+2,b.y+2,b.w-4,b.h-4);
        ctx.globalAlpha=1;ctx.shadowBlur=0;
      }else{ctx.fillStyle='#0f0';ctx.fillRect(b.x,b.y,5,5);}
    });
  });

  if(invaders)invaders.forEach(function(inv){drawInvader(inv);});
  drawBoss();

  // UFO
  if(ufo){
    var ux=ufo.x+20,uy=ufo.y+8;
    ctx.shadowBlur=15;ctx.shadowColor='#f00';
    ctx.fillStyle='#cc0000';ctx.beginPath();ctx.ellipse(ux,uy+4,20,6,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff4444';ctx.beginPath();ctx.ellipse(ux,uy,12,8,0,Math.PI,Math.PI*2);ctx.fill();
    ctx.fillStyle='#88ffff';ctx.shadowColor='#0ff';ctx.beginPath();ctx.ellipse(ux,uy-1,6,4,0,Math.PI,Math.PI*2);ctx.fill();
    ctx.fillStyle=fc%20<10?'#ff0':'#ff8800';
    ctx.beginPath();ctx.arc(ux-12,uy+4,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(ux+12,uy+4,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(ux,uy+8,2,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }

  // Powerups
  powerups.forEach(function(p){
    ctx.shadowBlur=12;
    if(p.type==='double'){
      ctx.fillStyle='#0ff';ctx.shadowColor='#0ff';ctx.font='bold 11px monospace';ctx.fillText('2X',p.x,p.y+10);
      ctx.strokeStyle='#0ff';ctx.lineWidth=1;ctx.strokeRect(p.x-1,p.y-1,16,14);
    }else{
      ctx.fillStyle='#7fffd4';ctx.shadowColor='#7fffd4';ctx.beginPath();ctx.arc(p.x+7,p.y+7,7,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';ctx.font='10px monospace';ctx.fillText('S',p.x+3,p.y+11);
    }
    ctx.shadowBlur=0;
  });

  // Bullets
  ctx.shadowBlur=10;ctx.shadowColor='#0ff';
  bullets.forEach(function(b){ctx.fillStyle='#0ff';ctx.shadowBlur=4;ctx.shadowColor='#0ff';ctx.fillRect(b.x,b.y,player.isSide?8:2,player.isSide?2:8);});
  ctx.shadowColor='#f66';
  ebullets.forEach(function(b){ctx.fillStyle='#f66';ctx.fillRect(b.x,b.y,player.isSide?10:3,player.isSide?3:10);});
  ctx.shadowBlur=0;

  // Shield bubble
  if(player.shieldTimer>0){
    var scx=player.x+18,scy=player.isSide?player.y+18:player.y+10;
    ctx.strokeStyle='#7fffd4';ctx.shadowBlur=14;ctx.shadowColor='#7fffd4';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(scx,scy,26,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=.15;ctx.fillStyle='#7fffd4';ctx.beginPath();ctx.arc(scx,scy,26,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;ctx.shadowBlur=0;
  }

  if(!player.isSide) drawPlayer();

  // Explosions
  exps.forEach(function(e){
    ctx.globalAlpha=e.life/22;ctx.fillStyle=e.c;ctx.shadowBlur=15;ctx.shadowColor=e.c;
    for(var i=0;i<8;i++){var a=i/8*Math.PI*2,r=(22-e.life)*1.4;ctx.fillRect(e.x+Math.cos(a)*r-2,e.y+Math.sin(a)*r-2,4,4);}
    ctx.globalAlpha=1;ctx.shadowBlur=0;
  });

  if(player.doubleTimer>0||player.shieldTimer>0)updateHUD();
}

// Controls
document.addEventListener('keydown',function(e){keys[e.key]=true;if(e.key===' ')e.preventDefault();if(e.key==='p'||e.key==='P'){if(running){paused=!paused;}};});
document.addEventListener('keyup',function(e){keys[e.key]=false;});

function addBtn(el,key){
  el.addEventListener('touchstart',function(e){initAudio();e.preventDefault();keys[key]=true;},{passive:false});
  el.addEventListener('touchend',function(e){e.preventDefault();keys[key]=false;},{passive:false});
  el.addEventListener('mousedown',function(){initAudio();keys[key]=true;});
  el.addEventListener('mouseup',function(){keys[key]=false;});
}
addBtn(document.getElementById('btn-up'),'ArrowUp');
addBtn(document.getElementById('btn-down'),'ArrowDown');
addBtn(document.getElementById('btn-left'),'ArrowLeft');
addBtn(document.getElementById('btn-right'),'ArrowRight');

var FB=document.getElementById('fire-btn');
FB.addEventListener('touchstart',function(e){initAudio();e.preventDefault();fpress=true;},{passive:false});
FB.addEventListener('touchend',function(e){e.preventDefault();fpress=false;},{passive:false});
FB.addEventListener('mousedown',function(){initAudio();fpress=true;});
FB.addEventListener('mouseup',function(){fpress=false;});

var tapC=0,tapT=0;
canvas.addEventListener('touchstart',function(e){
  if(!running)return;
  tapC++;clearTimeout(tapT);tapT=setTimeout(function(){tapC=0;},800);
  if(tapC>=3){
    tapC=0;level++;running=false;cancelAnimationFrame(animId);
    renderLV(level,function(){initLevel();running=true;animId=requestAnimationFrame(gameLoop);});
  }
},{passive:true});

renderStart();
stars=[[],[],[]];planets=[];comets=[];nebulas=[];
(function il(){
  if(running)return;
  requestAnimationFrame(il);
  ctx.clearRect(0,0,W,H);
  ctx.globalAlpha=.3;ctx.fillStyle='#fff';
  for(var i=0;i<3;i++)ctx.fillRect(Math.random()*W,Math.random()*H,1,1);
  ctx.globalAlpha=1;
})();
</script>
</body>
